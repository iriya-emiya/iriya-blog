<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100" height="100" rx="20" fill="#1A1612"/>
  
  <!-- 天鹅座星座 -->
  <g stroke="#B8C5D6" stroke-width="2" fill="none">
    <line x1="50" y1="25" x2="50" y2="50"/>
    <line x1="50" y1="50" x2="35" y2="65"/>
    <line x1="50" y1="50" x2="65" y2="65"/>
    <line x1="50" y1="50" x2="50" y2="75"/>
  </g>
  
  <!-- 星星 -->
  <circle cx="50" cy="25" r="4" fill="url(#grad1)"/>
  <circle cx="50" cy="50" r="5" fill="url(#grad1)"/>
  <circle cx="35" cy="65" r="3" fill="url(#grad1)"/>
  <circle cx="65" cy="65" r="3" fill="url(#grad1)"/>
  <circle cx="50" cy="75" r="4" fill="url(#grad1)"/>
</svg>
