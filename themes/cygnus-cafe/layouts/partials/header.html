<header class="site-header">
    <a href="{{ .Site.BaseURL | relURL }}" class="logo">
        <svg class="logo-svg" width="36" height="36" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Accretion disk: tilted elliptical orbits -->
            <g class="logo-orbits">
                <ellipse cx="24" cy="24" rx="20" ry="5.5" stroke="#c8d8ff" stroke-width="1.2" transform="rotate(18, 24, 24)" opacity="0.65"/>
                <ellipse cx="24" cy="24" rx="16" ry="4.5" stroke="#a0b8ff" stroke-width="1" transform="rotate(-22, 24, 24)" opacity="0.5"/>
                <ellipse cx="24" cy="24" rx="11" ry="3" stroke="#c8d8ff" stroke-width="0.9" transform="rotate(35, 24, 24)" opacity="0.6"/>
                <ellipse cx="24" cy="24" rx="6" ry="1.8" stroke="#b8a0d0" stroke-width="0.7" transform="rotate(-8, 24, 24)" opacity="0.4"/>
            </g>
            <!-- Singularity glow halo -->
            <circle cx="24" cy="24" r="3.5" fill="none" stroke="#c8d8ff" stroke-width="0.4" opacity="0.35" class="logo-singularity-glow"/>
            <!-- Singularity -->
            <circle cx="24" cy="24" r="1.5" fill="#c8d8ff" opacity="0.85" class="logo-singularity"/>
        </svg>
        <div class="logo-text">
            <span class="logo-main">天鹅座X-1</span>
            <span class="logo-sub">深空技术探测站</span>
        </div>
    </a>
    <nav class="nav">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
        <div class="nav-icons">
            <a href="{{ with .Site.Home.OutputFormats.Get "RSS" }}{{ .Permalink }}{{ end }}" aria-label="RSS">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 11a9 9 0 0 1 9 9"></path>
                    <path d="M4 4a16 16 0 0 1 16 16"></path>
                    <circle cx="5" cy="19" r="1"></circle>
                </svg>
            </a>
        </div>
    </nav>
</header>
