<header class="site-header">
    <a href="{{ .Site.BaseURL | relURL }}" class="logo">
        <span class="logo-icon">🦢</span>
        <div class="logo-text">
            <div class="logo-main">Cygnus Cafe</div>
            <div class="logo-sub">天鹅座咖啡馆</div>
        </div>
    </a>
    <nav class="nav">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}" class="nav-link">{{ .Name }}</a>
        {{ end }}
        <div class="nav-icons">
            <a href="{{ with .Site.Home.OutputFormats.Get "RSS" }}{{ .Permalink }}{{ end }}" aria-label="RSS订阅">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 11a9 9 0 0 1 9 9"></path>
                    <path d="M4 4a16 16 0 0 1 16 16"></path>
                    <circle cx="5" cy="19" r="1"></circle>
                </svg>
            </a>
        </div>
    </nav>
</header>

<style>
/* Header Styles */
.site-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 1.5rem 4rem;
}

/* Logo Container */
.logo {
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
}

.logo-icon {
    font-size: 2.5rem;
    display: inline-block;
    animation: rotate 30s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.logo-text {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
}

.logo-main {
    font-family: 'Long Cang', cursive;
    font-size: 1.5rem;
    line-height: 1;
    color: var(--cafe-latte);
    letter-spacing: 0.05em;
}

.logo-sub {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.75rem;
    line-height: 1;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    font-weight: 400;
}

/* Navigation - 所有链接统一字体 */
.nav {
    display: flex;
    align-items: center;
    gap: 3rem;
}

.nav-link {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    padding: 0.5rem 1rem;
    transition: color 0.3s ease;
}

.nav-icons {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-left: 1rem;
    padding-left: 1rem;
    border-left: 1px solid var(--border);
}

.nav-icons a:hover {
    color: var(--cafe-latte);
}

.nav-icons a {
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    padding: 0.5rem;
    transition: color 0.3s ease;
}

@media (max-width: 768px) {
    .site-header {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem 1.5rem;
    }
    
    .nav {
        gap: 1.5rem;
    }
}
</style>
